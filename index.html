<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1a0000; color: #fff; text-align: center; font-family: sans-serif; padding: 50px; }
  .btn { 
    background: #ff4d4d; color: white; padding: 15px 30px; 
    border: none; border-radius: 50px; font-size: 20px; 
    cursor: pointer; margin-top: 20px; display: inline-block;
  }
</style>
</head>
<body>

  <h1>Happy Birthday</h1>
  <h1>Rija Burney ❤️</h1>
  <p>Aaj ka din sirf tumhare naam hai... May Allah tumhari har dua qubool kare...</p>

  <button class="btn" onclick="openSurprise()">Continue Surprise ❤️</button>

  <div id="hidden" style="display:none; margin-top:30px;">
    <h2>🎂 Ab asli maza shuru! 🎊</h2>
    <p>Enjoy your special day!</p>
  </div>

  <script>
    function openSurprise() {
      document.getElementById('hidden').style.display = 'block';
    }
  </script>

</body>
</html>
