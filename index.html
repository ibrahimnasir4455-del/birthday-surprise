<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rija ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Loading Screen -->
    <div id="loader">
        <h1>Preparing Something Special...</h1>
    </div>

    <!-- Door Section -->
    <section id="door-section">

        <div class="door-container">

            <div class="left-door"></div>

            <div class="right-door"></div>

            <button id="openDoor">
                🔔 Knock To Open
            </button>

        </div>

    </section>

    <!-- Main Surprise -->
    <section id="surprise">

        <canvas id="fireworks"></canvas>

        <div id="balloons"></div>

        <h1 class="title">
            Happy Birthday
        </h1>

        <h2 class="name">
            Rija Burney ❤️
        </h2>

        <div id="cake"></div>

        <div id="message">

        </div>

        <button id="nextBtn">
            Continue Surprise ❤️
        </button>

    </section>
 <audio id="music" loop>
<source src="exactly.mp3" type="audio/mpeg">
 </audio>

<script src="script.js"></script>
</body>
</html>
